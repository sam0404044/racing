<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="最後車手 / Final Driver — 機制驗證場。">
  <meta name="color-scheme" content="dark">
  <title>最後車手 / Final Driver</title>
  <link rel="stylesheet" href="../final-driver.css">
  <style>
    /* 角落 HTML UI（不畫在 canvas、跟視窗錨定、不受設計座標 transform 影響）*/
    .corner-ui {
      position: fixed;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
    }
    .corner-ui.top-right { top: 12px; right: 12px; }
    .corner-ui-panel {
      background: rgba(10, 18, 28, 0.85);
      border: 1.5px solid rgba(120, 170, 220, 0.55);
      border-radius: 10px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .corner-ui-label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(180, 200, 230, 0.9);
      letter-spacing: 1px;
    }
    .corner-ui-btn {
      width: 36px;
      height: 30px;
      border-radius: 6px;
      background: rgba(70, 76, 88, 0.88);
      border: 1.5px solid rgba(190, 198, 210, 0.46);
      color: #d8ecff;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }
    .corner-ui-btn:hover {
      background: rgba(85, 92, 105, 0.95);
      transform: translateY(-1px);
    }
    .corner-ui-btn.active {
      background: rgba(169, 39, 42, 0.94);
      border-color: rgba(255, 188, 108, 0.88);
      color: #fff4d6;
      box-shadow: 0 0 12px rgba(255, 74, 54, 0.42);
    }

    /* 短螢幕提示（視窗高度不足時自動顯示）*/
    .height-hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(40, 28, 16, 0.96);
      border: 1.5px solid rgba(255, 188, 108, 0.7);
      border-radius: 12px;
      padding: 14px 56px 14px 20px;
      color: #fff4d6;
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                  0 0 24px rgba(255, 74, 54, 0.18);
      max-width: 480px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .height-hint.show {
      opacity: 1;
      pointer-events: auto;
    }
    .height-hint .hint-icon {
      color: rgba(255, 210, 120, 0.95);
      margin-right: 6px;
    }
    .height-hint .hint-sub {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: rgba(220, 200, 170, 0.78);
      margin-top: 4px;
    }
    .height-hint .hint-close {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 210, 120, 0.4);
      color: rgba(255, 230, 180, 0.85);
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s ease;
    }
    .height-hint .hint-close:hover {
      background: rgba(255, 255, 255, 0.12);
    }
  </style>
</head>
<body class="qte-test-page">
  <section class="qte-test hidden" id="qteTestRoot" aria-label="最後車手 / Final Driver"></section>

  <!-- 角落 UI：UI 大小切換 -->
  <div class="corner-ui top-right" id="cornerUi" style="display:none;">
    <div class="corner-ui-panel">
      <span class="corner-ui-label">UI</span>
      <button class="corner-ui-btn" data-ui-size="0.85">S</button>
      <button class="corner-ui-btn active" data-ui-size="1.0">M</button>
      <button class="corner-ui-btn" data-ui-size="1.15">L</button>
    </div>
  </div>

  <!-- 提示橫條：建議全螢幕、可關閉（sessionStorage 記憶）-->
  <div class="height-hint" id="heightHint">
    <span class="hint-icon">💡</span>
    <span>建議全螢幕遊玩、視覺體驗最佳</span>
    <span class="hint-sub">按 <strong>F11</strong> 進入全螢幕、或最大化瀏覽器視窗</span>
    <button class="hint-close" id="heightHintClose" aria-label="關閉提示">✕</button>
  </div>

  <noscript>
    <p class="qte-noscript-msg">請啟用 JavaScript，以開始最後車手 / Final Driver。</p>
  </noscript>

  <!-- canvas-viewport library（IIFE 掛 window.StoryCanvasViewport），main.js 之前載入 -->
  <script src="src/canvas-viewport.js"></script>
  <script type="module" src="src/main.js?v=20251130-hazard2"></script>

  <!-- 短螢幕提示控制器 -->
  <script>
    (function() {
      const hint = document.getElementById('heightHint');
      const closeBtn = document.getElementById('heightHintClose');
      if (!hint || !closeBtn) return;

      // 玩家已關過 → 整 session 不再顯示
      let dismissed = false;
      try {
        dismissed = sessionStorage.getItem('heightHintDismissed') === '1';
      } catch (e) {}

      function show() {
        if (dismissed) return;
        hint.classList.add('show');
      }

      closeBtn.addEventListener('click', () => {
        dismissed = true;
        hint.classList.remove('show');
        try {
          sessionStorage.setItem('heightHintDismissed', '1');
        } catch (e) {}
      });

      // 載入後延遲一下顯示（讓畫面穩定）
      setTimeout(show, 300);
    })();
  </script>
</body>
</html>
