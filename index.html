<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>卡牌衝線賽</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>卡牌衝線賽</h1>
        <p>每回合打出一張牌，衝刺、甩尾、防守或干擾對手。先跑完 1000 公尺的人獲勝。</p>
      </div>
      <div class="hud" aria-live="polite">
        <div class="pill"><span>回合</span><b id="turn">1</b></div>
        <div class="pill"><span>能量</span><b id="energy">3 / 3</b></div>
        <div class="pill"><span>狀態</span><b id="status">準備起跑</b></div>
      </div>
    </header>

    <section class="game-shell">
      <div class="track-wrap">
        <canvas id="game" width="1280" height="720" aria-label="賽車跑道"></canvas>
      </div>

      <aside class="side">
        <section class="box">
          <h2>車況</h2>
          <div class="meters">
            <div class="meter">
              <label><span>你的位置</span><b id="playerDistance">0m</b></label>
              <div class="bar"><div class="fill" id="playerBar"></div></div>
            </div>
            <div class="meter">
              <label><span>對手位置</span><b id="rivalDistance">0m</b></label>
              <div class="bar"><div class="fill" id="rivalBar"></div></div>
            </div>
            <div class="meter">
              <label><span>輪胎抓地</span><b id="gripText">100%</b></label>
              <div class="bar"><div class="fill" id="gripBar"></div></div>
            </div>
            <div class="meter">
              <label><span>加速</span><b id="accelText">50</b></label>
              <div class="bar"><div class="fill" id="accelBar"></div></div>
            </div>
            <div class="meter">
              <label><span>控制力</span><b id="controlText">55</b></label>
              <div class="bar"><div class="fill" id="controlBar"></div></div>
            </div>
            <div class="meter">
              <label><span>極速</span><b id="topSpeedText">50</b></label>
              <div class="bar"><div class="fill" id="topSpeedBar"></div></div>
            </div>
            <div class="meter">
              <label><span>氮氣</span><b id="nitroText">20</b></label>
              <div class="bar"><div class="fill" id="nitroBar"></div></div>
            </div>
            <div class="meter">
              <label><span>車手狀態</span><b id="driverText">50 / 55</b></label>
              <div class="bar"><div class="fill" id="driverBar"></div></div>
            </div>
            <div class="meter">
              <label><span>贊助資源</span><b id="sponsorText">50</b></label>
              <div class="bar"><div class="fill" id="sponsorBar"></div></div>
            </div>
            <div class="meter">
              <label><span>董事會信任</span><b id="boardText">50</b></label>
              <div class="bar"><div class="fill" id="boardBar"></div></div>
            </div>
            <div class="meter">
              <label><span>車隊關係</span><b id="paddockText">50</b></label>
              <div class="bar"><div class="fill" id="paddockBar"></div></div>
            </div>
            <div class="meter">
              <label><span>賽會聲望</span><b id="stewardText">50</b></label>
              <div class="bar"><div class="fill" id="stewardBar"></div></div>
            </div>
          </div>
        </section>

        <section class="box">
          <h2>賽況</h2>
          <div class="log" id="log" aria-live="polite"></div>
        </section>

        <section class="box">
          <h2>操作</h2>
          <div class="controls">
            <button class="primary" id="drawButton" type="button">補滿手牌</button>
            <button class="ghost" id="resetButton" type="button">重新比賽</button>
          </div>
          <div class="drive-pad" aria-label="即時駕駛控制">
            <button class="drive-button" data-drive="left" type="button">左轉 A</button>
            <button class="drive-button" data-drive="throttle" type="button">油門 W</button>
            <button class="drive-button" data-drive="right" type="button">右轉 D</button>
            <button class="drive-button" data-drive="brake" type="button">煞車 S</button>
            <button class="drive-button" data-drive="nitro" type="button">氮氣 Space</button>
            <button class="drive-button" data-drive="focus" type="button">控車 Shift</button>
          </div>
          <p class="hint-line">出牌後會進入短衝刺。直線按油門，彎道依提示轉向；彎中太貪油會打滑，控車或煞車能穩住。</p>
        </section>
      </aside>
    </section>

    <section class="card-dock" aria-label="卡牌區">
      <div class="play-zone" id="playZone">拖曳卡牌到這裡打出</div>
      <div class="cards" id="cards" aria-label="手牌"></div>
      <div class="dock-actions">
        <button class="next-round" id="nextRoundButton" type="button" hidden>下個回合</button>
      </div>
    </section>

    <footer>
      提示：出牌決定車況，短衝刺決定執行品質。遇到彎道時配合轉向與控速，可以把同一張牌跑出更高距離。
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
